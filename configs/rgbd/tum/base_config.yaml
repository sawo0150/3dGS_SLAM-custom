## SLAM parameters
Results:
  save_results: True         # 최종 결과(맵, 궤적 등)를 저장할지 여부
  save_dir: "results"        # 결과가 저장될 최상위 디렉토리명
  save_trj: True             # 카메라의 이동 궤적(Trajectory)을 저장할지 여부
  save_trj_kf_intv: 5        # 몇 번째 키프레임(Keyframe)마다 궤적을 저장할지 간격
  use_gui: True              # 실시간 시각화 GUI 창을 띄울지 여부 (디버깅/데모용으로 필수)
  eval_rendering: False      # 렌더링 품질(PSNR, SSIM 등)을 평가할지 여부 (실시간 구동 시에는 보통 끕니다)
  use_wandb: False           # Weights & Biases(WandB)를 통한 실험 로깅 사용 여부

Dataset:
  type: 'tum'                # 데이터셋 포맷 (TUM RGB-D 포맷을 사용 중)
  sensor_type: 'depth'       # 센서 타입 (RGB-D 카메라를 사용 중임을 의미. 앞선 코드의 'monocular'와 대비됨)
  pcd_downsample: 128        # 매 프레임 입력되는 포인트 클라우드(PCD)의 다운샘플링 비율 (숫자가 클수록 점을 적게 씀 = 속도 UP, 퀄리티 DOWN)
  pcd_downsample_init: 32    # 첫 프레임(초기화 단계)의 다운샘플링 비율 (초기 맵이 중요하므로 평소보다 조밀하게 32로 설정)
  adaptive_pointsize: True   # 거리에 따라 포인트(가우시안)의 크기를 동적으로 조절할지 여부
  point_size: 0.01           # 기본 포인트 사이즈

Training:
  # === Initialization (초기화 맵 빌딩 단계) ===
  # SLAM은 첫 프레임의 맵이 잘 잡혀야 이후 트래킹이 안 엇나갑니다.
  init_itr_num: 1050         # 초기 맵 생성을 위한 최적화(Optimization) 반복 횟수 (꽤 높게 잡혀있음)
  init_gaussian_update: 100  # 초기화 중 가우시안 파라미터(위치, 크기 등)를 업데이트하는 간격
  init_gaussian_reset: 500   # 투명도(Opacity)가 너무 낮거나 비정상적인 가우시안을 초기화하는 주기
  init_gaussian_th: 0.005    # 가우시안 생성/삭제 판단을 위한 임계값
  init_gaussian_extent: 30   # 가우시안이 커버할 수 있는 최대 공간적 범위(Scale)

# === Tracking and Mapping (실시간 추적 및 지도 작성) ===
  tracking_itr_num: 100      # 매 프레임 카메라 위치(Pose)를 찾기 위한 트래킹 최적화 횟수
  mapping_itr_num: 150       # 백그라운드에서 지도를 정교하게 다듬는 매핑 최적화 횟수
  gaussian_update_every: 150 # 매핑 중 가우시안의 Densification(분할/복제)을 수행하는 주기
  gaussian_update_offset: 50 # 업데이트 시작을 지연시키는 오프셋 (최적화가 어느 정도 안정된 후 추가하기 위함)
  gaussian_th: 0.7           # 가우시안의 투명도(Opacity) 임계값 (이보다 낮으면 렌더링에 기여하지 못한다고 판단하여 가지치기)
  gaussian_extent: 1.0       # 일반 맵핑 중 가우시안의 최대 크기 제한
  gaussian_reset: 2001       # 맵 전체의 가우시안 투명도를 주기적으로 리셋하는 간격 (플로터(Floater) 억제 목적)
  size_threshold: 20         # 가우시안 스케일이 이 값보다 커지면 너무 큰 덩어리로 판단하여 삭제

# === Keyframe (키프레임 관리) ===
  kf_interval: 5             # 최소 5프레임마다 한 번씩은 무조건 키프레임으로 등록
  window_size: 8             # 매핑 최적화 시 함께 최적화할 과거 키프레임의 개수 (Local Bundle Adjustment 윈도우 크기)
  pose_window: 3             # 트래킹 시 참고할 직전 프레임들의 개수
  edge_threshold: 1.1        # (아마도) 이미지 엣지나 깊이 값의 불연속성을 판단하는 임계값
  rgb_boundary_threshold: 0.01 # RGB 색상 경계를 판단하는 임계값
  alpha: 0.9                 # 깊이(Depth) 렌더링 손실함수 계산 시 RGB와 섞는 가중치 비율
  kf_translation: 0.08       # 이전 키프레임 대비 카메라가 0.08m 이상 이동하면 새 키프레임 등록
  kf_min_translation: 0.05   # 새 키프레임이 되기 위한 최소 이동 거리 보장 (너무 안 움직였는데 등록되는 것 방지)
  kf_overlap: 0.9            # 이전 프레임과 화면이 90% 이상 겹치면 굳이 새로 등록하지 않음
  kf_cutoff: 0.3             # (보통 뷰 프러스텀 밖의 가우시안을 잘라내는 비율)
  prune_mode: 'slam'         # 가우시안 가지치기(Pruning) 모드를 SLAM에 맞춤 (동적 생성/삭제 고려)
  single_thread: False       # 트래킹과 매핑을 단일 스레드에서 돌릴지 여부 (False이므로 병렬 처리됨)
  spherical_harmonics: False # 구면 조화 함수(보는 방향에 따른 색상 변화) 사용 여부. SLAM에선 연산량 때문에 끄는(False) 경우가 많음.

  # === Learning Rates (SLAM 전용 학습률) ===
  lr:
    cam_rot_delta: 0.003     # 카메라 회전(Rotation) 업데이트 학습률
    cam_trans_delta: 0.001   # 카메라 이동(Translation) 업데이트 학습률


## 3DGS default parameters
# 💡 오리지널 3D Gaussian Splatting의 공식 파라미터 세팅입니다.
opt_params:
  iterations: 30000          # 오프라인 학습 시 총 반복 횟수 (온라인 SLAM에서는 참고만 하거나 오프라인 맵 정제용으로 쓰임)
  position_lr_init: 0.00016  # 3D 점 위치(XYZ) 초기 학습률
  position_lr_final: 0.0000016 # 최종 학습률 (점차 감소함)
  position_lr_delay_mult: 0.01 # 학습률 감소 시작을 지연시키는 배수
  position_lr_max_steps: 30000 # 위치 학습률 감소가 끝나는 스텝
  feature_lr: 0.0025         # 색상 특성(SH 또는 RGB)의 학습률
  opacity_lr: 0.05           # 불투명도(Opacity) 학습률
  scaling_lr: 0.001          # 가우시안 크기(Scale) 학습률
  rotation_lr: 0.001         # 가우시안 회전(Quaternion) 학습률
  percent_dense: 0.01        # 분할(Clone/Split)할 때 씬 크기 대비 허용 오차 퍼센트
  lambda_dssim: 0.2          # 렌더링 이미지와 실제 이미지 비교 시 SSIM Loss를 얼마나 반영할지 (보통 L1 0.8 + SSIM 0.2)
  densification_interval: 100 # 밀집화(가우시안 쪼개기/복제) 간격
  opacity_reset_interval: 3000 # 불투명도를 주기적으로 0으로 낮춰서 잘못된 가우시안을 소멸시키는 주기
  densify_from_iter: 500     # 밀집화를 시작하는 이터레이션 (초기엔 전체 구조 잡기에 집중)
  densify_until_iter: 15000  # 밀집화를 멈추는 이터레이션
  densify_grad_threshold: 0.0002 # 위치 기울기(Gradient)가 이 값보다 크면 가우시안을 분할(Split)함

model_params:
  sh_degree: 0               # SH 차수 (0이면 각도에 상관없이 같은 색상). SLAM 설정에서 오버라이드 됨.
  source_path: ""            # 데이터셋 경로 (커맨드라인에서 입력받거나 다른 곳에서 덮어씀)
  model_path: ""             # 기존에 학습된 모델을 불러올 때 경로
  resolution: -1             # 이미지 해상도 강제 조절 (-1이면 원본 사용, 1이면 원본, 2면 1/2 사이즈 등)
  white_background: False    # 배경을 흰색으로 할지 여부 (실내 환경은 보통 False(검정))
  data_device: "cuda"        # 텐서를 올릴 장치 (GPU)

pipeline_params:
  convert_SHs_python: False  # SH 색상 변환을 파이썬 대신 CUDA 커널로 빠르게 처리(False)
  compute_cov3D_python: False # 3D 공분산 계산을 파이썬 대신 CUDA 커널로 빠르게 처리(False)


  