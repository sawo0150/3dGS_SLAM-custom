# hydra_configs/dataset/live_zmq.yaml

Dataset:
  name: live_zmq
  type: zmq
  sensor_type: monocular

  # 기존 코드 호환용
  dataset_path: ""
  data_path: ""

  # ZMQ 관련
  bundle_endpoint: tcp://127.0.0.1:5555
  use_external_pose: true
  control_endpoint: "tcp://127.0.0.1:5559"
  queue_size: 8

  # MonoGS가 기대하는 키들
  pcd_downsample: 32
  pcd_downsample_init: 32
  adaptive_pointsize: True
  point_size: 0.01

  Calibration:
    fx: 280.0
    fy: 280.0
    cx: 256.0
    cy: 256.0
    width: 512
    height: 512